<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <div class="card">
      <img class="profile_pic" src="./assets/images/avatar-jessica.jpeg" />
      <h1 class="title">Jessica Randall</h1>
      <h2 class="profile_location">London, United Kingdom</h2>
      <p class="about_me">"Front-end developer and avid reader."</p>
      <div class="btn-container">
        <button class="btn"><a href="" class="link">GitHub</a></button>
        <button class="btn"><a href="" class="link">Frontend Mentor</a></button>
        <button class="btn"><a href="" class="link">LinkedIn</a></button>
        <button class="btn"><a href="" class="link">Twitter</a></button>
        <button class="btn"><a href="" class="link">Instagram</a></button>
      </div>
    </div>
  </body>
</html>
